<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Mex Lozano Rafael Emilio" >
    <meta name="description" content="Tipos de inputs en HTML" >
    <title>Inputs en HTML</title>
</head>
<body>
    <h1>Inputs: </h1>
    <form>
        <label for="nombre">Introduce tu nombre</label>
        <input id="nombre" type="text" name="Nombre" required>
        <br> 
        <label for="apellido 1">Introduce tu correo electrónico</label>
        <input id="correo" type="email" name="correo" required>
        <br>
        <label for="apellido 2">Introduce tu segundo apellido</label>
        <input id="apellido2" type="text" name="Segundo apellido">
    </form>
    <button type="submit">Enviar</button>
</body>
</html>
